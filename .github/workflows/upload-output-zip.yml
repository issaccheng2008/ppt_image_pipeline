name: Build and upload output zip artifact

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/run_pipeline.py

      - name: Create zip artifact from output
        run: |
          mkdir -p artifacts
          zip -r artifacts/output_images_and_metadata.zip output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: output_images_and_metadata
          path: artifacts/output_images_and_metadata.zip
          if-no-files-found: error
